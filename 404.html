<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // If the URL is a /join/ deep link, redirect to the join page
    // GitHub Pages serves 404.html for any path that doesn't match a file
    const path = window.location.pathname;
    if (path.startsWith('/join/')) {
      // Stay on this page — the join content is rendered below
    } else {
      // Not a join link — show the 404 content
      document.documentElement.setAttribute('data-show-404', 'true');
    }
  </script>
  <title>Social Tennis Manager</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta property="og:title" content="You've been invited to a tennis session!">
  <meta property="og:description" content="Open in Social Tennis Manager to view details and join.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep:   #0d1f4e;
      --blue-mid:    #1a3fa0;
      --blue-bright: #2471a3;
      --green:       #b2e51a;
      --white:       #ffffff;
      --muted:       rgba(255,255,255,0.55);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blue-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 40%, rgba(26,63,160,0.5) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(36,113,163,0.3) 0%, transparent 60%),
        linear-gradient(160deg, #0d1f4e 0%, #122060 50%, #0d1f4e 100%);
      pointer-events: none;
    }

    /* ── Join page content ── */
    .join-page { display: block; position: relative; z-index: 1; padding: 24px; width: 100%; max-width: 460px; }
    .not-found-page { display: none; position: relative; z-index: 1; text-align: center; padding: 24px; }
    html[data-show-404='true'] .join-page { display: none; }
    html[data-show-404='true'] .not-found-page { display: block; }

    /* Card styles (shared) */
    .card {
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(26, 82, 118, 0.15);
    }
    .card-header {
      background: linear-gradient(135deg, #1e5f91, #2471a3, #1a5276);
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
    }
    .card-header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 130px; height: 130px;
      border-radius: 65px;
      border: 2px solid rgba(255,255,255,0.07);
    }
    .card-header::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 100px;
      border: 2px solid rgba(255,255,255,0.04);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 20px;
    }
    .brand-dot {
      width: 10px; height: 10px;
      border-radius: 5px;
      background: #b2e51a;
    }
    .brand-text {
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.4px;
    }
    .card-header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .card-header p {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
    }
    .card-body {
      padding: 28px;
      background: #ffffff;
    }
    .open-app-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2e86c1, #1a5276);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.3px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(26, 82, 118, 0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .open-app-btn:active {
      transform: scale(0.97);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: rgba(13, 33, 55, 0.3);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(26, 82, 118, 0.1);
    }
    .store-links {
      display: flex;
      gap: 12px;
    }
    .store-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 14px;
      background: #f4f9fd;
      border: 1.5px solid rgba(46, 134, 193, 0.2);
      border-radius: 12px;
      text-decoration: none;
      color: #0d2137;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.15s;
    }
    .store-btn:hover {
      background: rgba(46, 134, 193, 0.08);
    }
    .store-btn svg {
      width: 18px; height: 18px; flex-shrink: 0;
    }

    /* ── 404 page ── */
    .not-found-page h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 120px;
      line-height: 1;
      color: var(--green);
      margin-bottom: 8px;
    }
    .not-found-page p {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      color: var(--white);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.14); }
  </style>
</head>
<body>
<div class="bg-mesh"></div>

<!-- ── Join session content ── -->
<div class="join-page">
  <div class="card">
    <div class="card-header">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-text">SOCIAL TENNIS</span>
      </div>
      <h1>You've been invited to a session!</h1>
      <p>Open the app to view session details, check the player list, and join.</p>
    </div>
    <div class="card-body">
      <a id="openApp" href="#" class="open-app-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        Open in App
      </a>
      <div class="divider">DON'T HAVE THE APP?</div>
      <div class="store-links">
        <a href="https://apps.apple.com/app/id6759812658" class="store-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          App Store
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.berno1976.socialtennis" class="store-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814 13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893 2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199 2.302 2.302a1 1 0 0 1 0 1.38l-2.302 2.302L15.396 12l2.302-2.492zM5.864 2.658 16.8 8.99l-2.302 2.302L5.864 2.658z"/></svg>
          Google Play
        </a>
      </div>
    </div>
  </div>
</div>

<!-- ── 404 content ── -->
<div class="not-found-page">
  <h1>404</h1>
  <p>This page doesn't exist. Let's get you back on court.</p>
  <a href="/" class="home-btn">← Back to Home</a>
</div>

<script>
  // Extract club and session IDs from URL path: /join/{clubId}/{sessionId}
  const currentPath = window.location.pathname;
    if (currentPath.startsWith('/join/')) {
      const parts = currentPath.split('/').filter(Boolean);
    const clubId = parts[1] || '';
    const sessionId = parts[2] || '';
    const isAndroid = /Android/i.test(navigator.userAgent);
    const deepLink = isAndroid
  ? `intent://join/${clubId}/${sessionId}#Intent;scheme=socialtennis;package=com.berno1976.socialtennis;end`
  : `socialtennis://join/${clubId}/${sessionId}`;
    const openBtn = document.getElementById('openApp');
    if (openBtn) openBtn.href = deepLink;

    // Try to open the app automatically on mobile
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile && clubId && sessionId) {
      setTimeout(() => {
        window.location.href = deepLink;
      }, 300);
    }
  }
</script>
</body>
</html>
