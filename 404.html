  <meta charset="UTF-8">

  <title>Social Tennis Manager</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta property="og:title" content="You've been invited to a tennis session!">
  <meta property="og:description" content="Open in Social Tennis Manager to view details and join.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep:   #0d1f4e;
      --blue-mid:    #1a3fa0;
      --blue-bright: #2471a3;
      --green:       #b2e51a;
      --white:       #ffffff;
      --muted:       rgba(255,255,255,0.55);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blue-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 40%, rgba(26,63,160,0.5) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(36,113,163,0.3) 0%, transparent 60%),
        linear-gradient(160deg, #0d1f4e 0%, #122060 50%, #0d1f4e 100%);
      pointer-events: none;
    }

    /* Card styles (shared) */
    .card {
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(26, 82, 118, 0.15);
    }
    .card-header {
      background: linear-gradient(135deg, #1e5f91, #2471a3, #1a5276);
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
    }
    .card-header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 130px; height: 130px;
      border-radius: 65px;
      border: 2px solid rgba(255,255,255,0.07);
    }
    .card-header::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 100px;
      border: 2px solid rgba(255,255,255,0.04);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 20px;
    }
    .brand-dot {
      width: 10px; height: 10px;
      border-radius: 5px;
      background: #b2e51a;
    }
    .brand-text {
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.4px;
    }
    .card-header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .card-header p {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
    }
    .card-body {
      padding: 28px;
      background: #ffffff;
    }
    .open-app-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2e86c1, #1a5276);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.3px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(26, 82, 118, 0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .open-app-btn:active {
      transform: scale(0.97);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: rgba(13, 33, 55, 0.3);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(26, 82, 118, 0.1);
    }
    .store-links {
      display: flex;
      gap: 12px;
    }
    .store-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 14px;
      background: #f4f9fd;
      border: 1.5px solid rgba(46, 134, 193, 0.2);
      border-radius: 12px;
      text-decoration: none;
      color: #0d2137;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.15s;
    }
    .store-btn:hover {
      background: rgba(46, 134, 193, 0.08);
    }
    .store-btn svg {
      width: 18px; height: 18px; flex-shrink: 0;
    }

    /* ── 404 page ── */
     .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      color: var(--white);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }    
  </style>
</head>
<body>
<div class="bg-mesh"></div>

    </div>
  </div>
